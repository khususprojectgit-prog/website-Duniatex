<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QC Inspector Dashboard — Duniatex</title>
  <meta name="description" content="Dashboard QC Inspector untuk inspeksi kain PT Duniatex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    main { padding: 1.25rem; max-width: 660px; margin: 0 auto; }

    /* ── Active Inspection Banner ── */
    #activeBanner {
      display: none;
      background: linear-gradient(135deg,var(--accent-light),rgba(124,58,237,.06));
      border: 1px solid rgba(79,70,229,.25);
      border-radius: var(--radius);
      padding: 1rem 1.15rem;
      margin-bottom: 1.5rem;
      cursor: pointer;
      transition: all .2s;
      box-shadow: var(--shadow);
    }
    #activeBanner:hover { border-color: var(--accent); background: rgba(79,70,229,.1); }
    .banner-inner { display: flex; align-items: center; gap: .85rem; }
    .banner-pulse {
      width: 11px; height: 11px;
      background: var(--accent); border-radius: 50%; flex-shrink: 0;
      box-shadow: 0 0 0 0 var(--accent-glow);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 var(--accent-glow)} 50%{box-shadow:0 0 0 7px rgba(79,70,229,0)} }
    .banner-text { flex: 1; }
    .banner-title { font-size: .9rem; font-weight: 700; color: var(--accent); }
    .banner-sub   { font-size: .78rem; color: var(--muted); margin-top: .15rem; }
    .banner-arrow { color: var(--accent); font-size: 1.1rem; }

    /* ── Tab Filters ── */
    .filter-bar {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem;
    }
    .filter-tabs {
      display: flex; gap: .5rem;
    }
    .ftab {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: .55rem 1rem;
      font-size: .82rem; font-weight: 700; color: var(--muted);
      cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: .4rem;
      font-family: inherit;
    }
    .ftab.active {
      background: var(--accent-light); border-color: var(--accent); color: var(--accent);
    }
    .ftab-count {
      background: rgba(79,70,229,0.12); color: var(--accent);
      border-radius: 12px; padding: .1rem .45rem; font-size: .7rem; font-weight: 800;
    }
    .ftab.active .ftab-count {
      background: var(--accent); color: #fff;
    }
    .btn-ref {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); border-radius: var(--radius-sm);
      font: .78rem 'Inter', sans-serif; padding: .45rem .85rem;
      cursor: pointer; transition: all .2s; display: flex;
      align-items: center; gap: .35rem; box-shadow: var(--shadow);
    }
    .btn-ref:hover { border-color: var(--accent); color: var(--accent); }

    .roll-count {
      background: var(--accent-light); color: var(--accent);
      border: 1px solid rgba(79,70,229,.2);
      border-radius: 20px; font-size: .72rem; font-weight: 700;
      padding: .15rem .55rem;
    }

    /* ── Roll Cards ── */
    .roll-list { display: flex; flex-direction: column; gap: .75rem; }
    .roll-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.15rem;
      transition: all .2s; position: relative; overflow: hidden;
      box-shadow: var(--shadow);
    }
    .roll-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(to bottom, var(--accent), var(--accent-2));
      opacity: 0; transition: opacity .2s;
    }
    .roll-card:hover { border-color: var(--border-hi); box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .roll-card:hover::before { opacity: 1; }
    .roll-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: .85rem; }
    .roll-code { font-size: 1.1rem; font-weight: 800; letter-spacing: -.3px; color: var(--text); }
    .roll-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .45rem .75rem; margin-bottom: 1rem; }
    .meta-label { font-size: .67rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .meta-value { font-size: .875rem; font-weight: 600; color: var(--text); margin-top: .1rem; }
    .btn-start {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: .95rem; font-weight: 700; font-family: inherit;
      padding: .85rem; cursor: pointer;
      transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 14px var(--accent-glow);
      display: flex; align-items: center; justify-content: center; gap: .45rem;
    }
    .btn-start:active { transform: scale(.98); opacity: .9; }
    .btn-start:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }
    
    #modalStart { display:none; position:fixed; inset:0; background:rgba(15,23,42,.5); backdrop-filter:blur(4px); z-index:150; align-items:center; justify-content:center; padding:1rem; }
    #modalStart.open { display:flex; }
    .start-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; max-width:420px; width:100%; box-shadow:var(--shadow-md); max-height:90vh; overflow-y:auto; }
    .start-title { font-size:1rem; font-weight:800; margin-bottom:.25rem; }
    .start-sub { font-size:.8rem; color:var(--muted); margin-bottom:1rem; }
    .start-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; margin-bottom: 1.2rem; padding: .85rem; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); text-align: left; }
    .info-item { display: flex; flex-direction: column; }
    .info-item label { font-size: .65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 0px !important; }
    .info-item .info-val { font-size: .8rem; font-weight: 700; color: var(--text); margin-top: .15rem; }
    .shift-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.5rem; margin-bottom:1rem; }
    .shift-btn { border:2px solid var(--border); background:var(--surface2); border-radius:var(--radius-sm); padding:.65rem .4rem; font-size:.78rem; font-weight:700; cursor:pointer; transition:all .15s; }
    .shift-btn.active { border-color:var(--accent); background:var(--accent-light); color:var(--accent); }
    .start-field { margin-bottom:.75rem; }
    .start-field label { display:block; font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:.35rem; }
    .start-field input { width:100%; padding:.65rem .75rem; border:1px solid var(--border); border-radius:var(--radius-sm); font:inherit; }
    .start-acts { display:flex; gap:.5rem; margin-top:1rem; }
    .start-acts button { flex:1; padding:.75rem; border-radius:var(--radius-sm); font-weight:700; cursor:pointer; border:none; }
    .btn-start-cancel { background:var(--surface2); color:var(--text); border:1px solid var(--border)!important; }
    .btn-start-go { background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; }
    .last-update { font-size: .72rem; color: var(--muted); text-align: center; margin-top: 1.5rem; }
    .btn-ref.spinning .refresh-icon { animation: spin .6s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .refresh-icon { display: inline-block; }

    /* ── Search bar ── */
    .roll-search-wrap {
      position: relative; margin-bottom: 1.1rem;
    }
    .roll-search-wrap .rs-icon {
      position: absolute; left: .85rem; top: 50%; transform: translateY(-50%);
      font-size: .9rem; color: var(--muted); pointer-events: none;
    }
    #rollSearch {
      width: 100%; padding: .65rem .75rem .65rem 2.3rem;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font: .88rem 'Inter', sans-serif; color: var(--text);
      background: var(--surface); box-shadow: var(--shadow);
      transition: border-color .2s; box-sizing: border-box;
    }
    #rollSearch:focus { outline: none; border-color: var(--accent); }
    #rollSearch::placeholder { color: var(--muted); }

    /* ── Customer cards ── */
    .customer-grid { display: flex; flex-direction: column; gap: .75rem; }
    .customer-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.1rem 1.2rem;
      display: flex; align-items: center; gap: 1rem;
      cursor: pointer; transition: all .2s;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
    }
    .customer-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      opacity: 0; transition: opacity .2s;
    }
    .customer-card:hover { border-color: var(--border-hi); box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .customer-card:hover::before { opacity: 1; }
    .cust-avatar {
      width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; color: #fff;
    }
    .cust-info { flex: 1; min-width: 0; }
    .cust-name {
      font-size: 1rem; font-weight: 800; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cust-sub { font-size: .75rem; color: var(--muted); margin-top: .15rem; }
    .cust-badge {
      flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: .3rem;
    }
    .cust-count {
      background: var(--accent); color: #fff;
      border-radius: 20px; font-size: .72rem; font-weight: 700;
      padding: .2rem .65rem; white-space: nowrap;
    }
    .cust-pending-count {
      background: rgba(239,68,68,.12); color: #ef4444;
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 20px; font-size: .68rem; font-weight: 700;
      padding: .15rem .55rem; white-space: nowrap;
    }
    .cust-arrow { color: var(--muted); font-size: 1.1rem; flex-shrink: 0; transition: transform .2s; }
    .customer-card:hover .cust-arrow { transform: translateX(3px); color: var(--accent); }

    /* ── Customer search ── */
    .cust-search-wrap {
      position: relative; margin-bottom: 1.1rem;
    }
    .cust-search-wrap .cs-icon {
      position: absolute; left: .85rem; top: 50%; transform: translateY(-50%);
      font-size: .9rem; color: var(--muted); pointer-events: none;
    }
    #customerSearch {
      width: 100%; padding: .65rem .75rem .65rem 2.3rem;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font: .88rem 'Inter', sans-serif; color: var(--text);
      background: var(--surface); box-shadow: var(--shadow);
      transition: border-color .2s; box-sizing: border-box;
    }
    #customerSearch:focus { outline: none; border-color: var(--accent); }
    #customerSearch::placeholder { color: var(--muted); }

    /* ── Inner view ── */
    #innerView { display: none; }
    #outerView { display: block; }
    .inner-back-bar {
      display: flex; align-items: center; gap: .75rem; margin-bottom: 1.1rem;
    }
    .btn-back {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: .45rem .85rem;
      font: .82rem 'Inter', sans-serif; font-weight: 700;
      color: var(--accent); cursor: pointer; transition: all .15s;
      display: flex; align-items: center; gap: .35rem;
    }
    .btn-back:hover { background: var(--accent-light); border-color: rgba(79,70,229,.3); }
    .inner-cust-name {
      font-size: 1rem; font-weight: 800; color: var(--text);
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .inner-roll-count {
      background: var(--accent); color: #fff;
      border-radius: 20px; font-size: .7rem; font-weight: 700;
      padding: .2rem .6rem; flex-shrink: 0;
    }

    .no-result {
      text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: .9rem;
    }
    .no-result-icon { font-size: 2rem; margin-bottom: .5rem; }

    /* ── Potongan Table ── */
    .pot-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.15rem; margin-bottom: .75rem;
      box-shadow: var(--shadow);
    }
    .pot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-top: .85rem; border-top: 1px dashed var(--border); padding-top: .85rem; }
    .pot-item { display: flex; flex-direction: column; }
    .pot-label { font-size: .65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .pot-val { font-size: .9rem; font-weight: 700; color: var(--text); }
    .pot-netto { background: var(--accent-light); color: var(--accent); padding: .3rem .6rem; border-radius: 6px; font-weight: 800; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="sources/logo-duniatex.jpg" alt="Logo Duniatex" style="width:38px;height:38px;border-radius:10px;object-fit:cover;flex-shrink:0;box-shadow:0 4px 12px var(--accent-glow)"/>
    <div>
      <div class="brand-name">Duniatex <span class="badge-role">QC Inspector</span></div>
      <div class="user-name" id="userName">—</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-logout" id="logoutBtn">Keluar</button>
  </div>
</header>

<main>

  <!-- Active inspection resume banner -->
  <div id="activeBanner" role="button" tabindex="0">
    <div class="banner-inner">
      <div class="banner-pulse"></div>
      <div class="banner-text">
        <div class="banner-title">Inspeksi Sedang Berjalan</div>
        <div class="banner-sub" id="bannerSub">Klik untuk melanjutkan</div>
      </div>
      <div class="banner-arrow">→</div>
    </div>
  </div>

  <!-- Outer: section bar -->
  <div class="filter-bar" id="outerBar">
    <div class="filter-tabs" id="filterTabs">
      <button class="ftab active" data-status="NEW">Antrean <span class="ftab-count" id="cntNew">—</span></button>
      <button class="ftab" data-status="PENDING">Re-inspeksi <span class="ftab-count" id="cntPnd">—</span></button>
      <button class="ftab" data-status="HISTORY">Riwayat <span class="ftab-count" id="cntHistory">—</span></button>
      <button class="ftab" data-status="POTONGAN">Potongan <span class="ftab-count" id="cntPotongan">—</span></button>
    </div>
    <button class="btn-ref" id="refreshBtn">
      <span class="refresh-icon">⟳</span> Refresh
    </button>
  </div>

  <!-- OUTER VIEW: daftar customer -->
  <div id="outerView">
    <div class="cust-search-wrap" id="custSearchWrap" style="display:none">
      <span class="cs-icon">🔍</span>
      <input id="customerSearch" type="text" placeholder="Cari nama customer…" autocomplete="off"/>
    </div>
    <div id="customerList"></div>
  </div>

  <!-- POTONGAN VIEW -->
  <div id="potonganView" style="display:none">
    <div style="display:flex; gap:0.5rem; margin-bottom:1.1rem;">
      <div class="roll-search-wrap" style="flex:1; margin-bottom:0;">
        <span class="rs-icon">🔍</span>
        <input id="searchPotRoll" type="text" placeholder="No. Roll Manual…" autocomplete="off" style="padding-left:2.1rem; font-size:0.8rem;"/>
      </div>
      <div class="roll-search-wrap" style="flex:1; margin-bottom:0;">
        <span class="rs-icon">🔍</span>
        <input id="searchPotOpk" type="text" placeholder="Cari OPK…" autocomplete="off" style="padding-left:2.1rem; font-size:0.8rem;"/>
      </div>
    </div>
    <div id="potonganList"></div>
  </div>

  <!-- INNER VIEW: roll per customer -->
  <div id="innerView">
    <div class="inner-back-bar">
      <button class="btn-back" id="btnBack">← Kembali</button>
      <div class="inner-cust-name" id="innerCustName"></div>
      <span class="inner-roll-count" id="innerRollCount"></span>
    </div>
    <div class="roll-search-wrap">
      <span class="rs-icon">🔍</span>
      <input id="rollSearch" type="text" placeholder="Cari kode roll…" autocomplete="off"/>
    </div>
    <div id="rollList"></div>
  </div>

  <div class="last-update" id="lastUpdate" style="display:none"></div>

</main>

<div id="modalStart">
  <div class="start-box">
    <div class="start-title" id="startRollTitle">Mulai Inspeksi</div>
    <div class="start-sub">Isi data kain sebelum mencatat cacat.</div>
    <div class="start-info-grid">
      <div class="info-item"><label>OPK</label><span class="info-val" id="mInfoOpk">—</span></div>
      <div class="info-item"><label>Op. Produksi</label><span class="info-val" id="mInfoOp">—</span></div>
      <div class="info-item"><label>Nomer Roll</label><span class="info-val mono" id="mInfoRoll">—</span></div>
      <div class="info-item"><label>Req. Benang</label><span class="info-val" id="mInfoYarn">—</span></div>
      <div class="info-item"><label>Req. Setting</label><span class="info-val" id="mInfoSetting">—</span></div>
      <div class="info-item" style="grid-column: span 2;"><label>Catatan Admin</label><span class="info-val" id="mInfoNotes" style="font-weight: 500; font-size: .78rem; white-space: pre-wrap;">—</span></div>
    </div>
    <div class="start-field">
      <label>Shift kerja</label>
      <div class="shift-row">
        <button type="button" class="shift-btn" data-shift="pagi">Pagi</button>
        <button type="button" class="shift-btn" data-shift="siang">Siang</button>
        <button type="button" class="shift-btn" data-shift="malam">Malam</button>
      </div>
    </div>
    <div class="start-field"><label>Nama QC</label><input id="stQc" type="text" maxlength="100" placeholder="cth: QC Budi"/></div>
    <div class="start-field"><label>Nama Operator</label><input id="stOperator" type="text" maxlength="100" placeholder="cth: Op. Slamet"/></div>
    <div id="startErr" style="color:var(--danger);font-size:.82rem;display:none;margin-top:.25rem"></div>
    <div class="start-acts">
      <button type="button" class="btn-start-cancel" id="startCancel">Batal</button>
      <button type="button" class="btn-start-go" id="startConfirm">Mulai</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const BASE  = 'http://127.0.0.1:8000/api';
  const token = localStorage.getItem('token');
  if (!token) window.location.replace('index.html');

  // Role guard
  const _role = localStorage.getItem('role');
  if (_role && _role !== 'qc') {
    window.location.replace({ admin: 'admin.html', qc: 'qc.html' }[_role] || 'index.html');
  }

  // User display
  const uname = localStorage.getItem('user_name');
  if (uname) document.getElementById('userName').textContent = uname;

  // ── Helpers ─────────────────────────────────────────
  const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function auth() {
    return { Authorization: `Bearer ${token}`, Accept: 'application/json', 'Content-Type': 'application/json' };
  }

  let toastT;
  function toast(msg, type = '', dur = 2800) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = type ? `show ${type}` : 'show';
    clearTimeout(toastT);
    toastT = setTimeout(() => el.className = '', dur);
  }

  // ── Active inspection check ──────────────────────────
  async function checkActiveInspection() {
    try {
      const res  = await fetch(`${BASE}/qc/my-inspections?status=IN_PROGRESS`, { headers: auth() });
      if (!res.ok) return;
      const data = await res.json();
      const list = Array.isArray(data)           ? data
                 : Array.isArray(data.data)       ? data.data
                 : Array.isArray(data.data?.data) ? data.data.data
                 : [];
      const active = list[0] ?? null;
      if (!active) {
        document.getElementById('activeBanner').style.display = 'none';
        return;
      }

      localStorage.setItem('inspection_id', active.id);
      const banner  = document.getElementById('activeBanner');
      const rollCode = active.roll?.roll_code ?? `#${active.id}`;
      document.getElementById('bannerSub').textContent =
        `Roll: ${rollCode} — Klik untuk melanjutkan inspeksi`;
      banner.style.display = 'block';
    } catch (_) {}
  }

  document.getElementById('activeBanner').addEventListener('click', () => {
    window.location.href = 'inspection.html';
  });
  document.getElementById('activeBanner').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') window.location.href = 'inspection.html';
  });

  // ── Skeleton ─────────────────────────────────────────
  function showSkeleton() {
    document.getElementById('customerList').innerHTML = [1,2,3].map(() => `
      <div class="sk-card" style="margin-bottom:0.75rem;padding:1.15rem;border:1px solid var(--border);border-radius:var(--radius)">
        <div class="skeleton sk-line w-60" style="height:14px;border-radius:4px;margin-bottom:8px"></div>
        <div class="skeleton sk-line w-40" style="height:12px;border-radius:4px"></div>
      </div>`).join('');
    document.getElementById('lastUpdate').style.display = 'none';
  }

  // ── Load rolls ───────────────────────────────────────
  let currentStatus = window.location.hash.replace('#', '') || 'NEW';
  if (!['NEW', 'PENDING', 'HISTORY', 'POTONGAN'].includes(currentStatus)) currentStatus = 'NEW';
  
  let _allRolls    = [];   // semua roll tersedia
  let _allHistory  = [];   // semua riwayat inspeksi
  let _allPotongan = [];   // semua data potongan
  let _groups      = {};   // grouped by customer name
  let _colorMap    = {};   // nama customer → [c1, c2, emoji]

  // Set active class on filter tab button based on initial status
  document.querySelectorAll('.ftab').forEach(b => {
    if (b.dataset.status === currentStatus) {
      b.classList.add('active');
    } else {
      b.classList.remove('active');
    }
  });

  async function loadRolls() {
    const refreshBtn = document.getElementById('refreshBtn');
    refreshBtn.classList.add('spinning');
    showSkeleton();

    try {
      const [rollsRes, inspectionsRes, potonganRes] = await Promise.all([
        fetch(`${BASE}/qc/my-rolls`, { headers: auth() }),
        fetch(`${BASE}/qc/my-inspections`, { headers: auth() }),
        fetch(`${BASE}/qc/potongan`, { headers: auth() })
      ]);

      if (rollsRes.status === 401 || inspectionsRes.status === 401 || potonganRes.status === 401) {
        localStorage.clear();
        window.location.replace('index.html');
        return;
      }

      const rollsData = await rollsRes.json();
      const inspectionsData = await inspectionsRes.json();
      const potonganData = await potonganRes.json();

      const rolls = Array.isArray(rollsData) ? rollsData
                  : Array.isArray(rollsData.data) ? rollsData.data
                  : Array.isArray(rollsData.data?.data) ? rollsData.data.data
                  : [];

      const inspections = Array.isArray(inspectionsData) ? inspectionsData
                        : Array.isArray(inspectionsData.data) ? inspectionsData.data
                        : Array.isArray(inspectionsData.data?.data) ? inspectionsData.data.data
                        : [];

      const potongans = Array.isArray(potonganData) ? potonganData
                      : Array.isArray(potonganData.data) ? potonganData.data
                      : Array.isArray(potonganData.data?.data) ? potonganData.data.data
                      : [];

      // Update count badges
      const cntNew = rolls.filter(r => (r.status || '').toUpperCase() === 'NEW').length;
      const cntPnd = rolls.filter(r => (r.status || '').toUpperCase() === 'PENDING').length;
      document.getElementById('cntNew').textContent = cntNew;
      document.getElementById('cntPnd').textContent = cntPnd;
      document.getElementById('cntHistory').textContent = inspections.length;
      document.getElementById('cntPotongan').textContent = potongans.length;

      _allRolls = rolls;
      _allHistory = inspections;
      _allPotongan = potongans;

      if (currentStatus === 'HISTORY') {
        renderRolls(inspections);
      } else if (currentStatus === 'POTONGAN') {
        renderPotongan(potongans);
      } else {
        renderRolls(rolls);
      }

      // Update last update timestamp
      const lu = document.getElementById('lastUpdate');
      lu.textContent = `Diperbarui: ${new Date().toLocaleTimeString('id-ID')}`;
      lu.style.display = 'block';

    } catch (err) {
      console.error(err);
      document.getElementById('customerList').innerHTML = `
        <div class="state-box">
          <div class="state-icon">⚠️</div>
          <h3>Gagal Memuat Data</h3>
          <p>Tidak dapat terhubung ke server.<br>Pastikan backend berjalan dan coba refresh.</p>
        </div>`;
    } finally {
      refreshBtn.classList.remove('spinning');
    }
  }

  // ── Status pill helper ───────────────────────────────────
  function rollStatusPill(status) {
    const s = (status || '').toUpperCase();
    const map = {
      NEW:         ['pill-new', 'BARU'],
      IN_PROGRESS: ['pill-ip',  'IN PROGRESS'],
      SUBMITTED:   ['pill-sub', 'TAHAN'],
      VALIDATED:   ['pill-val', 'LOLOS'],
      PENDING:     ['pill-pnd', 'RE-INSPEKSI'],
    };
    const [cls, label] = map[s] ?? ['pill-new', s];
    return `<span class="status-pill ${cls}">${label}</span>`;
  }

  const COLORS = [
    ['#4f46e5','#7c3aed','🏢'], ['#059669','#0d9488','🏭'],
    ['#d97706','#b45309','🧶'], ['#dc2626','#b91c1c','👔'],
    ['#7c3aed','#a21caf','🎯'], ['#0284c7','#0369a1','📦'],
    ['#0891b2','#0e7490','🧵'], ['#16a34a','#15803d','🎨'],
  ];

  // ── Build group map ───────────────────────────────────
  function buildGroups(items) {
    const groups = {};
    items.forEach(item => {
      const roll = currentStatus === 'HISTORY' ? (item.roll ?? {}) : item;
      const name = roll.request?.client?.client_name
                ?? roll.inspection_request?.client?.client_name
                ?? 'Tanpa Customer';
      if (!groups[name]) groups[name] = [];
      groups[name].push(item);
    });
    const sorted = Object.keys(groups).sort();
    sorted.forEach((name, i) => {
      _colorMap[name] = COLORS[i % COLORS.length];
    });
    return groups;
  }

  // ── OUTER VIEW: render customer cards ─────────────────
  function showOuterView(query = '') {
    document.getElementById('outerView').style.display = 'block';
    document.getElementById('innerView').style.display = 'none';
    document.getElementById('outerBar').style.display  = 'flex';

    const q    = query.trim().toLowerCase();
    const keys = Object.keys(_groups).sort().filter(k => !q || k.toLowerCase().includes(q));
    const container = document.getElementById('customerList');
    container.innerHTML = '';

    if (keys.length === 0) {
      container.innerHTML = `
        <div class="no-result">
          <div class="no-result-icon">🔍</div>
          <div>Customer <strong>"${esc(query)}"</strong> tidak ditemukan</div>
        </div>`;
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'customer-grid';

    keys.forEach(name => {
      const rolls   = _groups[name];
      const [c1, c2, emoji] = _colorMap[name] ?? COLORS[0];

      const card = document.createElement('div');
      card.className = 'customer-card';
      card.innerHTML = `
        <style>.customer-card[data-name="${esc(name)}"]::before{background:linear-gradient(to bottom,${c1},${c2});}</style>
        <div class="cust-avatar" style="background:linear-gradient(135deg,${c1},${c2})">${emoji}</div>
        <div class="cust-info">
          <div class="cust-name">${esc(name)}</div>
          <div class="cust-sub">${rolls.length} roll menunggu inspeksi</div>
        </div>
        <div class="cust-badge">
          <span class="cust-count" style="background:linear-gradient(135deg,${c1},${c2})">${rolls.length} roll</span>
        </div>
        <div class="cust-arrow">›</div>`;
      card.setAttribute('data-name', name);
      card.addEventListener('click', () => showInnerView(name));
      grid.appendChild(card);
    });

    container.appendChild(grid);
  }

  // ── INNER VIEW: render rolls per customer ──────────────
  function showInnerView(customerName) {
    document.getElementById('outerView').style.display = 'none';
    document.getElementById('outerBar').style.display  = 'none';
    document.getElementById('innerView').style.display = 'block';

    const rolls = _groups[customerName] ?? [];
    document.getElementById('innerCustName').textContent  = customerName;
    document.getElementById('innerRollCount').textContent = `${rolls.length} roll`;
    document.getElementById('rollSearch').value = '';

    renderRollList(rolls, '');

    document.getElementById('rollSearch').oninput = function() {
      renderRollList(rolls, this.value);
    };
  }

  // ── Build single history card ──────────────────────────
  function buildHistoryCard(insp) {
    const roll = insp.roll ?? {};
    const status = (insp.status || '').toUpperCase();
    const opk = roll.request?.opk ?? roll.inspection_request?.opk ?? '—';
    const reqCode = roll.request?.request_code ?? roll.inspection_request?.request_code ?? '—';
    const client = roll.request?.client?.client_name ?? roll.inspection_request?.client?.client_name ?? '';

    const card = document.createElement('div');
    card.className = 'roll-card';
    card.id = `insp-card-${insp.id}`;
    card.innerHTML = `
      <div class="roll-top">
        <div class="roll-code">${esc(roll.roll_code || '—')}</div>
        ${rollStatusPill(status)}
      </div>
      <div class="roll-meta-grid">
        <div class="meta-item">
          <div class="meta-label">OPK</div>
          <div class="meta-value">${esc(opk)}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Hasil</div>
          <div class="meta-value" style="font-weight:700;color:var(--accent)">Grade ${esc(insp.result || '—')}</div>
        </div>
        <div class="meta-item" style="grid-column:span 2">
          <div class="meta-label">Order</div>
          <div class="meta-value">${esc(reqCode)}${client ? ` · ${esc(client)}` : ''}</div>
        </div>
      </div>
      <button class="btn-start" onclick="location.href='qc-detail.html?id=${insp.id}'" style="background:var(--accent-light);color:var(--accent);border:1px solid rgba(79,70,229,.2);box-shadow:none">
        🔍 Lihat Detail
      </button>`;
    return card;
  }

  // ── Build single roll card ─────────────────────────────
  function buildRollCard(roll) {
    if (currentStatus === 'HISTORY') {
      return buildHistoryCard(roll);
    }
    const status    = (roll.status || '').toUpperCase();
    const isPending = status === 'PENDING';
    const opk       = roll.request?.opk ?? roll.inspection_request?.opk ?? '—';
    const reqCode   = roll.request?.request_code ?? roll.inspection_request?.request_code ?? '—';
    const client    = roll.request?.client?.client_name ?? roll.inspection_request?.client?.client_name ?? '';

    const card = document.createElement('div');
    card.className = 'roll-card';
    if (isPending) card.style.borderColor = 'rgba(239,68,68,.35)';
    card.id = `roll-card-${roll.id}`;
    card.innerHTML = `
      <div class="roll-top">
        <div class="roll-code">${esc(roll.roll_code)}</div>
        ${rollStatusPill(status)}
      </div>
      ${isPending ? `<div style="font-size:.78rem;color:#ef4444;margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem">⚠ Dikembalikan QC — perlu inspeksi ulang</div>` : ''}
      <div class="roll-meta-grid">
        <div class="meta-item">
          <div class="meta-label">OPK</div>
          <div class="meta-value">${esc(opk)}</div>
        </div>
        <div class="meta-item" style="grid-column:span 2">
          <div class="meta-label">Order</div>
          <div class="meta-value">${esc(reqCode)}${client ? ` · ${esc(client)}` : ''}</div>
        </div>
      </div>
      <button class="btn-start" id="start-${roll.id}" style="${isPending ? 'background:linear-gradient(135deg,#b91c1c,#ef4444);box-shadow:0 4px 16px rgba(239,68,68,.28)' : ''}">
        ${isPending ? '↺&nbsp; Mulai Inspeksi Ulang' : '▶&nbsp; Mulai Inspeksi'}
      </button>`;
    card.querySelector(`#start-${roll.id}`)
        .addEventListener('click', () => openStartModal(roll, card.querySelector(`#start-${roll.id}`), isPending));
    return card;
  }

  // ── Render roll list dengan filter ────────────────────
  function renderRollList(rolls, query = '') {
    const container = document.getElementById('rollList');
    container.innerHTML = '';
    const q = query.trim().toLowerCase();
    const filtered = q
      ? rolls.filter(item => {
          const r = currentStatus === 'HISTORY' ? (item.roll ?? {}) : item;
          return (r.roll_code||'').toLowerCase().includes(q);
        })
      : rolls;

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="no-result">
          <div class="no-result-icon">🔍</div>
          <div>Roll <strong>"${esc(query)}"</strong> tidak ditemukan</div>
        </div>`;
      return;
    }
    const list = document.createElement('div');
    list.className = 'roll-list';
    filtered.forEach(roll => list.appendChild(buildRollCard(roll)));
    container.appendChild(list);
  }

  // ── Render Potongan ───────────────────────────────────
  function renderPotongan(data, rollQuery = '', opkQuery = '') {
    document.getElementById('outerView').style.display   = 'none';
    document.getElementById('innerView').style.display   = 'none';
    document.getElementById('potonganView').style.display = 'block';
    
    const container = document.getElementById('potonganList');
    container.innerHTML = '';

    if (!data) data = [];

    const rq = String(rollQuery || '').trim().toLowerCase();
    const oq = String(opkQuery || '').trim().toLowerCase();
    
    const filtered = data.filter(item => {
      const manualRoll = String(item.manual_roll_number || '').toLowerCase();
      const opk = String(item.roll?.request?.opk ?? item.roll?.inspection_request?.opk ?? '').toLowerCase();
      
      const matchRoll = !rq || manualRoll.includes(rq);
      const matchOpk = !oq || opk.includes(oq);
      
      return matchRoll && matchOpk;
    });

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="state-box">
          <div class="state-icon">🔍</div>
          <h3>${(rq || oq) ? 'Hasil Tidak Ditemukan' : 'Belum Ada Data Potongan'}</h3>
          <p>${(rq || oq) ? 'Tidak ada data yang cocok dengan kriteria pencarian Anda.' : 'Data akan muncul otomatis jika ada inspeksi yang memiliki potongan berat.'}</p>
        </div>`;
      return;
    }

    filtered.forEach(item => {
      const card = document.createElement('div');
      card.className = 'pot-card';
      const machine = item.roll?.machine?.name ?? '—';
      const manualRoll = item.manual_roll_number ?? '—';
      const customer = item.roll?.inspection_request?.client?.client_name ?? '—';
      
      // Conditional Potongan 2: only show if > 0
      const pot2Html = parseFloat(item.potongan_2_kg) > 0 
        ? `<div class="pot-item">
            <span class="pot-label">Potongan 2</span>
            <span class="pot-val">${item.potongan_2_kg}</span>
           </div>` 
        : '';

      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
          <div style="font-size:1.1rem;font-weight:800;color:var(--text)">Roll: ${esc(manualRoll)}</div>
          <button class="btn-ref" style="font-size:0.7rem;padding:0.2rem 0.5rem;margin:0" onclick="location.href='qc-detail.html?id=${item.id}'">
            🔍 Lihat Detail
          </button>
        </div>
        <div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.85rem">
          ${esc(customer)} <span style="opacity:0.5;margin:0 4px">•</span> <span style="font-weight:600">${esc(machine)}</span>
        </div>
        
        <div class="pot-grid">
          <div class="pot-item">
            <span class="pot-label">Berat (kg)</span>
            <span class="pot-val">${item.weight_kg}</span>
          </div>
          <div class="pot-item">
            <span class="pot-label">Berat Akhir (kg)</span>
            <span class="pot-val"><span class="pot-netto">${item.weight_netto}</span></span>
          </div>
          <div class="pot-item">
            <span class="pot-label">Potongan 1</span>
            <span class="pot-val">${item.potongan_1_kg}</span>
          </div>
          ${pot2Html}
        </div>
      `;
      container.appendChild(card);
    });
  }

  // ── Render rolls entry point ───────────────────────────
  function renderRolls(data) {
    document.getElementById('potonganView').style.display = 'none';
    const filtered = currentStatus === 'HISTORY' ? data : data.filter(r => (r.status || '').toUpperCase() === currentStatus);
    _groups   = buildGroups(filtered);

    const custSearch = document.getElementById('custSearchWrap');
    const custKeys = Object.keys(_groups);

    if (custKeys.length > 0) {
      custSearch.style.display = 'block';
    } else {
      custSearch.style.display = 'none';
    }

    if (filtered.length === 0) {
      const msgs = {
        NEW: 'Tidak ada roll dalam antrean saat ini.',
        PENDING: 'Tidak ada roll yang perlu di-reinspeksi saat ini.',
        HISTORY: 'Belum ada riwayat inspeksi.'
      };
      const icons = {
        NEW: '✅',
        PENDING: '📋',
        HISTORY: '⏳'
      };
      document.getElementById('customerList').innerHTML = `
        <div class="state-box">
          <div class="state-icon">${icons[currentStatus] || '🔍'}</div>
          <h3>${msgs[currentStatus] || 'Tidak ada data.'}</h3>
        </div>`;
      return;
    }

    document.getElementById('customerSearch').value = '';
    showOuterView();
  }

  // ── Start inspection modal ────────────────────────────
  let pendingStart = null;
  let selectedShift = '';

  document.querySelectorAll('.shift-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.shift-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedShift = btn.dataset.shift;
    });
  });

  document.getElementById('startCancel').addEventListener('click', () => {
    document.getElementById('modalStart').classList.remove('open');
    if (pendingStart?.btn) {
      pendingStart.btn.disabled = false;
      pendingStart.btn.innerHTML = pendingStart.defaultLabel;
    }
    pendingStart = null;
  });



  function openStartModal(roll, btn, isPending = false) {
    pendingStart = {
      rollId: roll.id,
      rollCode: roll.roll_code,
      btn,
      isPending,
      defaultLabel: isPending ? '↺&nbsp; Mulai Inspeksi Ulang' : '▶&nbsp; Mulai Inspeksi',
    };
    selectedShift = '';
    document.querySelectorAll('.shift-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('startRollTitle').textContent = `Mulai — ${roll.roll_code}`;

    document.getElementById('mInfoOpk').textContent  = roll.request?.opk ?? roll.inspection_request?.opk ?? '—';
    document.getElementById('mInfoOp').textContent   = roll.assigned_operator?.name ?? roll.operator?.name ?? '—';
    document.getElementById('mInfoRoll').textContent = roll.roll_code;
    document.getElementById('mInfoYarn').textContent = roll.request?.yarn_type?.yarn_name ?? roll.inspection_request?.yarn_type?.yarn_name ?? '—';
    document.getElementById('mInfoSetting').textContent = roll.request?.setting?.setting_name ?? roll.inspection_request?.setting?.setting_name ?? '—';
    document.getElementById('mInfoNotes').textContent = roll.request?.notes ?? roll.inspection_request?.notes ?? '—';

    document.getElementById('stQc').value      = roll.request?.qc?.name ?? roll.inspection_request?.qc?.name ?? '';
    document.getElementById('stOperator').value = roll.assigned_operator?.name ?? roll.operator?.name ?? '';

    const err = document.getElementById('startErr');
    err.style.display = 'none';
    err.textContent   = '';
    document.getElementById('modalStart').classList.add('open');
  }

  document.getElementById('startConfirm').addEventListener('click', submitStartInspection);

  async function submitStartInspection() {
    if (!pendingStart) return;
    const err = document.getElementById('startErr');
    const qc = document.getElementById('stQc').value.trim();
    const operator = document.getElementById('stOperator').value.trim();

    if (!selectedShift) {
      err.textContent = 'Pilih shift kerja.';
      err.style.display = 'block';
      return;
    }
    if (!qc) {
      err.textContent = 'Nama QC wajib diisi.';
      err.style.display = 'block';
      return;
    }
    if (!operator) {
      err.textContent = 'Nama Operator wajib diisi.';
      err.style.display = 'block';
      return;
    }

    const btn = document.getElementById('startConfirm');
    btn.disabled = true;
    btn.textContent = 'Memulai…';

    try {
      const res = await fetch(`${BASE}/qc/rolls/${pendingStart.rollId}/start`, {
        method: 'POST',
        headers: auth(),
        body: JSON.stringify({
          shift:         selectedShift,
          qc_name:       qc,
          operator_name: operator,
        }),
      });
      const data = await res.json();

      if (!res.ok) {
        err.textContent = data.message || 'Gagal memulai inspeksi.';
        err.style.display = 'block';
        return;
      }

      const inspId = data.data?.id ?? data.id ?? data.inspection?.id;
      if (inspId) localStorage.setItem('inspection_id', String(inspId));

      document.getElementById('modalStart').classList.remove('open');
      toast(pendingStart.isPending ? 'Inspeksi ulang dimulai!' : 'Inspeksi dimulai!', 'success', 1200);
      setTimeout(() => window.location.href = 'inspection.html', 800);
    } catch (_) {
      err.textContent = 'Koneksi gagal. Coba lagi.';
      err.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Mulai';
      if (pendingStart?.btn) {
        pendingStart.btn.disabled = false;
        pendingStart.btn.innerHTML = pendingStart.defaultLabel;
      }
    }
  }

  // Filter tabs click listener
  document.getElementById('filterTabs').addEventListener('click', e => {
    const btn = e.target.closest('.ftab');
    if (!btn) return;
    document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStatus = btn.dataset.status;
    document.getElementById('customerSearch').value = '';
    document.getElementById('searchPotRoll').value = '';
    document.getElementById('searchPotOpk').value = '';
    window.location.hash = currentStatus;
    if (currentStatus === 'HISTORY') {
      renderRolls(_allHistory);
    } else if (currentStatus === 'POTONGAN') {
      renderPotongan(_allPotongan);
    } else {
      renderRolls(_allRolls);
    }
  });

  function triggerPotonganSearch() {
    const rollQ = document.getElementById('searchPotRoll').value;
    const opkQ = document.getElementById('searchPotOpk').value;
    renderPotongan(_allPotongan, rollQ, opkQ);
  }

  document.getElementById('searchPotRoll').addEventListener('input', triggerPotonganSearch);
  document.getElementById('searchPotOpk').addEventListener('input', triggerPotonganSearch);

  // ── Logout ────────────────────────────────────────────
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try { await fetch(`${BASE}/logout`, { method: 'POST', headers: auth() }); } catch(_) {}
    localStorage.clear();
    window.location.replace('index.html');
  });

  // ── Refresh ───────────────────────────────────────────
  document.getElementById('refreshBtn').addEventListener('click', () => {
    checkActiveInspection();
    loadRolls();
  });

  // ── Auto-refresh every 45s ────────────────────────────
  setInterval(loadRolls, 45_000);

  // ── Tombol Kembali (inner → outer) ───────────────────
  document.getElementById('btnBack').addEventListener('click', () => {
    document.getElementById('rollSearch').value = '';
    showOuterView(document.getElementById('customerSearch').value);
  });

  // ── Live search customer (outer view) ────────────────
  document.getElementById('customerSearch').addEventListener('input', function () {
    showOuterView(this.value);
  });

  // ── Init ──────────────────────────────────────────────
  checkActiveInspection();
  loadRolls();
</script>
</body>
</html>
